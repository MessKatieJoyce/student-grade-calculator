<!DOCTYPE html>
<html>
<head>
    <title>Simple Grading System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
    
    body{
        font-family:"Segoe UI", Arial, sans-serif;
        background:#1e2228;
        margin:0;
        color:#e4e6eb;

        background-image:url("tulip.jpg");
        background-size:cover;
        background-position:center;
        background-attachment:fixed;
    }

    /* TOP BAR */

    .topbar{
        background:#11151a;
        border-bottom:3px solid #2c3e50;
        padding: 5px 20px;
        box-shadow:0 3px 8px rgba(0,0,0,0.4);
    }

    .topbar h3{
        margin-left: 20px;
        font-weight:500;
        letter-spacing:.5px;
        line-height:1.2;
        font-size: small;
    }

    /* CONTAINERS */

    .container{
        background:rgba(47, 36, 67, 0.85);
        backdrop-filter:blur(1px);
        padding:25px;
        margin: 50px auto;
        width:90%;
        max-width: 500px;
        border-radius:10px;
        box-shadow:0 6px 15px rgba(0,0,0,0.35);
        text-align:center;
    }



    .container h3{
        margin-top:0;
        font-weight:600;
        border-bottom:2px solid #3a4048;
        padding-bottom:10px;
    }

    .containergrade{
        background:rgba(47, 36, 67, 0.85);
        backdrop-filter:blur(1px);
        padding:25px;
        margin:30px auto;
        width:80%;
        max-width:900px;
        border-radius:10px;
        box-shadow:0 6px 15px rgba(0,0,0,0.35);
    }

    /* SUBJECT INPUT */

    .subject-input{
        margin-bottom:10px;
        width:100%;

    }

    #subjectsContainer{
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
    }

    /* INPUTS */

    input{
        padding:10px;
        width:100%;
        box-sizing:border-box;
        border-radius:6px;
        border:1px solid #533972;
        background:rgba(44, 33, 64, 0.85);
        color:#e4e6eb;
    }

    input:focus{
        outline:none;
        border-color:#914ae2;
    }

/* BUTTONS */

button{
    padding:9px 16px;
    margin-top:12px;
    margin-right:8px;
    border:none;
    border-radius:6px;
    background:#1a0822;
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#650098;
}

button:active{
    transform:scale(.96);
} 

/* REMOVE SUBJECT BUTTON */

.remove-subject{
    background:none;
    border:none;
    color:#042c5e;
    cursor:pointer;
    font-size:13px;
}

.remove-subject:hover{
    background-color: #251238;
    color:#3783b5;
}

/* TABLE */

.table-wrapper{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    width:100%;
}

table{
    width:max-content;
    min-width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

/* TABLE HEADER */

th{
    background:#1b0f28;
    color:#f0f3f6;
    padding:12px 10px;
    font-weight:600;
    border-bottom:2px solid #3a4048;
}

th .subject-header{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
}

/* TABLE CELLS */

th,td{
    border:1px solid #ccc;
    text-align:center;
    vertical-align:middle;
}

td{
    padding:10px;
    border-bottom:1px solid #4f6c92;
}

th:not(:first-child){
    min-width:110px;
}

/* ZEBRA ROWS */

tbody tr:nth-child(even){
    background:#2b2431;
}

tbody tr:hover{
    background:#130018;
}

/* STICKY NAME COLUMN */

th:first-child,
td:first-child{
    background:#391842;
    z-index:2;
}

.row-number{
    width:40px;
    font-weight:600;
}

/* NAME INPUT */

td:first-child input{
    width:90%;
}

/* GRADE INPUT */

td input[type="number"]{
    width:65px;
    text-align:center;
    display:block;
    margin:auto;
}

/* DELETE BUTTON IN TABLE */

td button{
    background:#8f0000;
}

td button:hover{
    background:#c14545;
}

/* MOBILE RESPONSIVE */

@media screen and (max-width:768px){

    .topbar{
        font-size:13px;
        padding: 8px;
    }

    .container{
        width:50%;
        padding:20px;
        margin:40px auto;
    }

    button{
        width:100%;
        padding:9px 19px;
        margin-top: 7px;
        margin-right:2px;
        font-size: 11px;
    }

    .button-group{
        flex-direction:column;
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
    }


    .subject-input input{
        width:100%;
        font-size: 11.5px;
    }

    .containergrade{
        width:90%;
        max-width:300px;
    }

    td input[type="text"]{
        width:90%;
        font-size: 11px;
    }

    td input[type="number"]{
        width:50px;
    }

    th,
    td{
        padding:4px;
        font-size:11px;
    }

}
  </style>
</head>

<body>
    <div class="topbar">
        <h3> Kate Joyce P. Superio | BSIT 3A
        </h3> 
    </div>
  
    <div class="container">
        <h3>Enter Subjects</h3>

        <div id="subjectsContainer">
            <div class="subject-input">
                <input type="text" class="subject" placeholder="Enter Subject">
            </div>
        </div>
        
        <div class="button-group">
            <button onclick="addSubject()">Add Subject</button>
            <button onclick="saveSubjects()">Save Subjects</button>
        </div>
    </div>
    
    <div class="containergrade" id="gradingContainer" style="display:none">
        <h3>Grading Sheet</h3>

        <div class="table-wrapper">
            <table id="gradingTable">
                <thead>
                    <tr id="tableHeader">
                        <th>#</th>
                        <th>Name</th>
                        <th>Average</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="button-group">
            <button onclick="addStudent()">Add Student</button>
        </div>
    </div>
    
    <script>
    
    let subjects=[];
    
    /* CAPITALIZE NAME */
    function capitalizeName(input){
        let words=input.value.toLowerCase().split(" ");
        for(let i=0;i<words.length;i++){
            if(words[i]){
                words[i]=words[i][0].toUpperCase()+words[i].substring(1);
            }
        }
        
        input.value=words.join(" ");
    }

    /* ADD SUBJECT INPUT */
    
    function addSubject(){
        let container=document.getElementById("subjectsContainer");
        let div=document.createElement("div");
        div.className="subject-input";
        div.innerHTML='<input type="text" class="subject" placeholder="Enter Subject">';
        container.appendChild(div);
    }

    /* SAVE SUBJECTS */

    function saveSubjects(){
        let inputs=document.querySelectorAll(".subject");
        let header=document.getElementById("tableHeader");
        let rows=document.querySelectorAll("#tableBody tr");

        inputs.forEach(input=>{

        let subject=input.value.trim();
        if(subject!=="" && !subjects.includes(subject)){
            subjects.push(subject);
            let th=document.createElement("th");
            th.innerHTML = `
            <div class="subject-header">
                <span>${subject}</span>
                <button class="remove-subject" onclick="deleteSubject(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            `;
            
            /* insert before Average column */
            
            header.insertBefore(th,header.children[header.children.length-2]);
            rows.forEach(row=>{
                let td=document.createElement("td");
                td.innerHTML='<input type="number" min="0" max="99" oninput="computeAverage(this)">';
                row.insertBefore(td,row.children[row.children.length-2]);
            });
        }
        });
    
        /* show table */
        document.getElementById("gradingContainer").style.display="block";

        /* reset subject input */
        document.getElementById("subjectsContainer").innerHTML=
            '<div class="subject-input"><input type="text" class="subject" placeholder="Enter Subject"></div>';
    }


    /* ADD STUDENT */
    function addStudent(){
        let table=document.getElementById("tableBody");
        let row=document.createElement("tr");

        /* NUMBER COLUMN */
        let number=document.createElement("td");
        number.className="row-number";
        row.appendChild(number);
  
        /* NAME */
        let name=document.createElement("td");
        name.innerHTML='<input type="text" oninput="capitalizeName(this)">';
        row.appendChild(name);

        /* SUBJECTS */
        subjects.forEach(()=>{
            let td=document.createElement("td");
            td.innerHTML='<input type="number" oninput="limitGrade(this);computeAverage(this)">';
            row.appendChild(td);
        });

        /* AVERAGE */
        let avg=document.createElement("td");
        avg.innerText="0";
        row.appendChild(avg);

        /* DELETE BUTTON */
        let del=document.createElement("td");
        del.innerHTML='<button onclick="deleteStudent(this)">Delete</button>';
        row.appendChild(del);
  
        table.appendChild(row);

        updateRowNumbers();
    }

    function updateRowNumbers(){
        let rows=document.querySelectorAll("#tableBody tr");
        rows.forEach((row,index)=>{
            row.querySelector(".row-number").innerText=index+1;
        });
    }
    
    /* limit grade */
    function limitGrade(input){
        if(input.value.length > 2){
            input.value = input.value.slice(0,2);
        }
    
        if(parseInt(input.value) > 99){
            input.value = 99;
        }
    }
  
    /* DELETE STUDENT */
    function deleteStudent(btn){
        btn.parentElement.parentElement.remove();
        updateRowNumbers();
    }

  
    /* REMOVE SUBJECT */
  
    function deleteSubject(btn){

        let th = btn.closest("th"); // get the real header cell
        let index = th.cellIndex;

        subjects.splice(index-2,1);

        th.remove();

        let rows = document.querySelectorAll("#tableBody tr");

        rows.forEach(row=>{
            row.deleteCell(index);

            // recompute average after column deletion
            let grades = row.querySelectorAll("input[type='number']");
            let total = 0;
            let count = 0;

            grades.forEach(g=>{
                if(g.value !== ""){
                    total += parseFloat(g.value);
                    count++;
                }
            });

            let average = count ? (total/count).toFixed(2) : 0;
            row.children[row.children.length-2].innerText = average;

        });

    }

    /* COMPUTE AVERAGE */
    function computeAverage(input){
        let row=input.parentElement.parentElement;
        let grades=row.querySelectorAll("input[type='number']");

        let total=0;
        let count=0;

        grades.forEach(g=>{
            if(g.value!==""){
                total+=parseFloat(g.value);
                count++;
            }
        });
        
        let average=count?(total/count).toFixed(2):0;
        row.children[row.children.length-2].innerText=average;
    }

    document.querySelectorAll("input").forEach(input => {
        
        input.addEventListener("focus", function(){
            setTimeout(() => {
                this.scrollIntoView({
                    behavior:"smooth",
                    block:"center"
                });
            },300);

        });

    });

</script>

</body>
</html>
