<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Web App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ========== GLOBAL ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #121212;
    color: #e0e0e0;
    min-height: 100vh;
}

/* ========== NAVBAR ========== */
.nav {
    background: #1e1e2f;
    padding: 20px 50px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    width: 100%;
}

.nav-text {
    display: flex;
    flex-direction: column;
    gap: 5px; /* space between name and course */
}

.nav-text h2 {
    color: #fff;
    margin: 0;
}

.nav-text h4 {
    color: #bbb;
    margin: 0;
    font-weight: normal;
    font-size: 16px;
}

/* ========== BUTTONS ========== */
.back {
    background: #3f51b5;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.back:hover {
    background: #5c6bc0;
    transform: translateY(-2px);
}

/* ========== CONTAINER ========== */
.container {
    background: #1f1f2e;
    margin: 40px auto;
    width: 500px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.container {
    background: #1f1f2e;
    margin: 40px auto;
    max-width: 500px;
    width: 90%;
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
}

/* ========== INPUTS ========== */
input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #121212;
    color: #e0e0e0;
    transition: all 0.3s ease;
}

input::placeholder {
    color: #888;
}

input:focus {
    outline: none;
    border-color: #3f51b5;
    box-shadow: 0 0 8px rgba(63,81,181,0.6);
    transform: scale(1.02);
}

/* ========== BUTTONS ========== */
button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    margin-top: 10px;
}

.add-btn,
.compute-btn,
.default-subjects-btn {
    width: 100%;
    background: #3f51b5;
    color: white;
}

.add-btn:hover,
.compute-btn:hover,
.default-subjects-btn:hover {
    background: #5c6bc0;
    transform: scale(1.03);
}

.clear-btn {
    width: 100%;
    background: #b71c1c;
    color: white;
}

.clear-btn:hover {
    background: #d32f2f;
}

/* ========== SUBJECT ROW ========== */
.subject-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
}

.subject-row input {
    flex: 1;
}

.delete-btn {
    background: #b71c1c;
    color: white;
    padding: 8px 10px;
    border-radius: 8px;
}

.delete-btn:hover {
    background: #d32f2f;
}

.table-wrapper{
    overflow-x: auto;
    width:100%;
    margin: auto;
    border-radius: 10px;
    transform-origin: top left;
}

.grade-input{
    width:55px;
text-align:center;
background:#121212;
border:1px solid #444;
color:white;
border-radius:6px;
padding:4px;
}


.grade-input:focus{
    outline:none;
    border-color:#5c6bc0;
}


/* ========== GRADING SHEET ========== */
#gradingSheetContainer {
    margin: 60px auto;
    max-width: 900px;
}

#gradingSheet {
    width: 100%;
    border-collapse: collapse;
    background: #1f1f2e;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    font-size: 14px; /* smaller text */
    
}



#gradingSheet th {
    background: #333;
}

#gradingSheet td button {
    padding: 4px 8px;
    background: #b71c1c;
    color: white;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

#gradingSheet th,
#gradingSheet td {
    border: 1px solid #333;
    padding: 6px 8px; /* smaller padding */
    text-align: center;
    color: white;
}

#gradingSheet td {
    background:#2a2a3d;
}

#gradingSheet td:first-child,
#gradingSheet th:first-child {
    position: sticky;
    left: 0;
    background: #333;
    z-index: 2;
    font-weight: bold;
    color: white;

}

#gradingSheet td:first-child {
    background:#2c2c55;
}

#gradingSheet th:first-child{
    position: sticky;
    left: 0;
    background: #0c0254;
    font-weight: bold;
    color: white;
    z-index:3;

}

#gradingSheet td button:hover {
    background: #d32f2f;
}

#gradingSheet tbody tr:hover{
    background:#2a2a3d;
}

/* ========== MOBILE RESPONSIVE ========== */
@media (max-width: 768px){
     body{
        font-size:16px;
    }

    .nav{
        padding:15px 20px;
        position: sticky;
        top: 0;
    }

    .nav-text h2{
        font-size:18px;
    }

    .nav-text h4{
        font-size:14px;
    }

    .container{
        width: 75%;
        padding:30px;
        margin: 50px auto;
        
    }

    .container h2{
        font-size:20px;
    }

    input{
        font-size:16px;
        padding:10px;
    }

    button{
        font-size:16px;
        padding:10px;
    }

    /* stack subject row on small screens */
    .subject-row{
        display: flexbox;
        gap:5px;
    }

    .subject-row input {
    flex: 1;
    width: 50%;
}

    .subject-row button {
        width: 25px;
    }

    .delete-btn{
        width:100%;
    }

    .table-wrapper{
    overflow-x:auto;
    overflow-y:hidden;
    width:100%;
    margin:auto;
    }

    /* grading sheet smaller text */

    #gradingSheetContainer {
    margin: 90px auto;
    width: 100%;
    }

    #gradingSheet{
        font-size: 14px;
        
    }

    #gradingSheet{
    border-collapse: collapse;
    width: max-content;
    }

    #gradingSheet th,
    #gradingSheet td{
        padding: 8px;      
        min-width:90px;
        text-align:center;
    }

    #gradingSheet td:first-child {
    background:#2c2c55;
    padding: 5px;
    }

    #gradingSheet th:first-child{
    position: sticky;
    left: 0;
    background: #0c0254;
    font-weight: bold;
    color: white;
    z-index:3;
    padding: 5px;
  

    }

    

}
</style>

</head>

<body>

<div class="nav">
    <div class="nav-text">
        <h2>Kate Joyce P. Superio</h2>
        <h4>BSIT 3A</h4>
    </div>
</div>
    
<div class="container">
    <h2>Student Grade Calculator</h2>

    <input type="text" id="studentName" placeholder="Student Name">

    <div id="subjects"></div>

    <button class="default-subjects-btn" onclick="fillDefaultSubjects()">Use Default Subjects</button>
    <button class="add-btn" onclick="addSubject()">Add Subject</button>
    <button class="compute-btn" onclick="calculateAverage()">Generate Average</button>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<!-- Grading Sheet Output -->
<div id="gradingSheetContainer">
    <div class="table-wrapper"></div>
</div>

<script>
let subjectsList = []; // stores all subjects added dynamically
const defaultSubjects = ["Math", "Science", "English", "Filipino", "History"];

function addSubject(prefilled="") {
    const div = document.createElement("div");
    div.className = "subject-row";

    div.innerHTML = `
        <input type="text" placeholder="Subject Name" value="${prefilled}" style="text-transform: capitalize;">
        <input type="number" placeholder="Grade">
        <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
    `;

    document.getElementById("subjects").appendChild(div);
}

// Fill default subjects
function fillDefaultSubjects() {
    document.getElementById("subjects").innerHTML = "";
    defaultSubjects.forEach(sub => addSubject(sub));
}

function calculateAverage() {
    const name = document.getElementById("studentName").value.trim();
    const subjectRows = document.querySelectorAll(".subject-row");

    if (name === "") {
        alert("Please enter student name.");
        return;
    }

    if (subjectRows.length === 0) {
        alert("Please add at least one subject.");
        return;
    }

    let total = 0, count = 0;
    let subjects = [];
    let grades = [];

    for (let row of subjectRows) {
        let subject = row.children[0].value.trim();
        subject = subject
        .toLowerCase()
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");

        const grade = row.children[1].value;

        // Skip completely empty rows
        if (subject === "" && grade === "") continue;

        if (subject === "") {
            alert("One subject has no name.");
            return;
        }

        let numericGrade;
        if (grade === "") {
            const decision = confirm(`Grade missing for subject: ${subject}\nPress OK to include as 0\nPress Cancel to ignore this subject.`);
            numericGrade = decision ? 0 : null;
            if (numericGrade === null) continue;
        } else {
            numericGrade = parseFloat(grade);
        }

        total += numericGrade;
        count++;
        subjects.push(subject);
        grades.push(numericGrade);
    }

    if (count === 0) {
        alert("No valid grades to compute.");
        return;
    }

    const average = total / count;
    const sheetContainer = document.querySelector(".table-wrapper");


    // Initialize table if first student
    if (!document.getElementById("gradingSheet")) {
        subjects.forEach(sub => {
            if (!subjectsList.includes(sub)) subjectsList.push(sub);
        });

        let headerHTML = '<table id="gradingSheet"><thead><tr><th>Name</th>';
        subjectsList.forEach(sub => headerHTML += `<th>${sub}</th>`);
        headerHTML += '<th>Average</th><th>Action</th></tr></thead><tbody id="sheetBody"></tbody></table>';

        sheetContainer.innerHTML = headerHTML;
    } 
    
    else 
    {
        // Update header if new subjects
        subjects.forEach(sub => {
            if (!subjectsList.includes(sub)) {
                subjectsList.push(sub);

                const headerRow = document.querySelector("#gradingSheet thead tr");
                const avgTh = headerRow.children[headerRow.children.length - 2];

                const th = document.createElement("th");
                th.innerText = sub;

                headerRow.insertBefore(th, avgTh);

                // ⭐ Add empty cell to existing rows
                const rows = document.querySelectorAll("#gradingSheet tbody tr");

                rows.forEach(row => {
                    const avgCell = row.querySelector(".avg-cell");

                    const td = document.createElement("td");
                    td.innerHTML = `<input type="number" class="grade-input" oninput="updateAverage(this)">`;

                    row.insertBefore(td, avgCell);
                });
            }
        });
    }

    // Add student row
    const tbody = document.getElementById("sheetBody");
    const tr = document.createElement("tr");

// Student name
tr.innerHTML = `<td>${name}</td>`;

// Subject grade inputs
subjectsList.forEach(sub => {
    const idx = subjects.indexOf(sub);
    const gradeValue = idx >= 0 ? grades[idx] : "";

    tr.innerHTML += `
        <td>
            <input 
                type="number" 
                value="${gradeValue}" 
                class="grade-input"
                oninput="updateAverage(this)"
            >
        </td>
    `;
});

// Average column
tr.innerHTML += `<td class="avg-cell">${average.toFixed(2)}</td>`;

// Action column
tr.innerHTML += `
<td>
<button class="delete-btn" onclick="this.closest('tr').remove()">Delete</button>
</td>
`;

tbody.appendChild(tr);

    clearInput(); // clear for next student
}

// Clear only input fields (not grading sheet)
function clearInput() {
    document.getElementById("studentName").value = "";
    document.getElementById("subjects").innerHTML = "";
}

// Clear everything including grading sheet and subjects
function clearAll() {
    clearInput();
    document.querySelector(".table-wrapper").innerHTML = "";
    subjectsList = [];
}

function updateAverage(input){

    const row = input.closest("tr");
    const gradeInputs = row.querySelectorAll(".grade-input");

    let total = 0;
    let count = 0;

    gradeInputs.forEach(g=>{
        const val = parseFloat(g.value);
        if(!isNaN(val)){
            total += val;
            count++;
        }
    });

    const avgCell = row.querySelector(".avg-cell");

    if(count > 0){
       avgCell.innerText = (total/count).toFixed(2);
    }else{
        avgCell.innerText = "-";
    }

}

let zoomLevel = 1;

document.querySelector(".table-wrapper").addEventListener("wheel", function(e) {

    if(e.ctrlKey){
        e.preventDefault();

        if(e.deltaY < 0){
            zoomLevel += 0.1;
        }else{
            zoomLevel -= 0.1;
        }

        zoomLevel = Math.min(Math.max(zoomLevel, 0.6), 1.5);

        this.style.transform = `scale(${zoomLevel})`;
    }

});

</script>

</body>
</html>
